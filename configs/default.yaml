## SentinelForge Default Configuration
## Copy this file and customize for your environment.
## Environment variables with SF_ prefix override these values.

project_name: SentinelForge
environment: development
debug: false
simulation_mode: true

# Aggressiveness: passive, moderate, aggressive
aggressiveness: moderate

# LLM Configuration
# Defaults to local Ollama — no external API calls required.
llm:
  provider: ollama
  model: llama3.1:8b
  base_url: http://localhost:11434
  api_key: ""
  temperature: 0.1
  max_tokens: 4096

# Safety Configuration — DO NOT weaken in production
safety:
  human_approval_required: true
  max_actions_per_minute: 10
  allowed_containment_actions:
    - block_ip
    - isolate_host
    - disable_account
    - kill_process
    - quarantine_file
  blocked_actions:
    - wipe_disk
    - shutdown_network
    - delete_logs
    - format_drive
    - disable_firewall
  prompt_injection_detection: true
  sandbox_mode: true

# Monitoring Configuration
monitor:
  log_sources:
    - syslog
    - file
  poll_interval_seconds: 5
  anomaly_threshold: 0.7
  log_file_paths:
    - ./data/sample_logs.txt
  watch_directories: []
  enable_windows_events: false
  enable_sysmon: false
  enable_file_integrity: false
  file_integrity_paths: []
  enable_network_monitor: false
  network_alert_threshold_mbps: 100.0

# Connector Configuration
connectors:
  siem_type: none          # Options: none, elasticsearch, splunk
  siem_url: ""
  siem_api_key: ""
  threat_intel_feeds:
    - otx
    - misp_local

# Authentication — disabled by default for development
auth:
  enabled: false
  jwt_secret: ""           # Set via SF_JWT_SECRET env var
  token_expiry_seconds: 3600
  dashboard_password: changeme
  require_auth_for_api: false

# API Configuration
api:
  host: "0.0.0.0"
  port: 8000
  rate_limit_per_minute: 60
  cors_origins:
    - "*"
  max_request_size_kb: 1024

# Logging Configuration
logging:
  level: INFO
  log_to_file: false
  log_file_path: ./logs/sentinelforge.log
  log_max_size_mb: 50
  log_backup_count: 5
  log_format: json

# Health Monitoring
health:
  enable_self_monitor: true
  cpu_alert_percent: 90.0
  memory_alert_percent: 85.0
  check_interval_seconds: 30

# Responder Configuration
responder:
  canary_mode: true
  executor_timeout_seconds: 30
  allowed_executors:
    - block_ip
    - isolate_host
    - disable_account
    - kill_process
    - quarantine_file
  approval_timeout_seconds: 300
  auto_deny_on_timeout: true

# Alerting Configuration
alerts:
  enabled: true
  console_alerts: true
  file_alerts: true
  alert_file_path: ./logs/alerts.log
  webhook_url: ""
  webhook_enabled: false
  min_severity: high

# Data paths
vector_db_path: ./data/vector_db
audit_log_path: ./data/audit.log
